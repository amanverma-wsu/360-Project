name: CougFS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc make valgrind

      - name: Build
        run: make all

      - name: Run tests
        run: make test

      - name: Memory check with Valgrind
        run: |
          valgrind --leak-check=full --error-exitcode=1 ./test_cougfs
